apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: 303713699681.dkr.ecr.us-east-1.amazonaws.com/eks-commerce-notification:a908d6dd6919
          ports:
            - containerPort: 3000