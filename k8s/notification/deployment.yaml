apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: 303713699681.dkr.ecr.us-east-1.amazonaws.com/eks-commerce-notification:43fa8b558637
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres.ecommerce.svc.cluster.local:5432/commerce"
            - name: DB_SCHEMA
              value: "notification"