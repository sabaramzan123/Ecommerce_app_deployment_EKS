apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/eks-commerce-order:latest
          ports:
            - containerPort: 3000