apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/eks-commerce-payment:latest
          ports:
            - containerPort: 3000