apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 303713699681.dkr.ecr.us-east-1.amazonaws.com/eks-commerce-frontend:28c45b433c74
          ports:
            - containerPort: 3000
          env:
            - name: API_BASE_URL
              value: "http://gateway.ecommerce.svc.cluster.local"