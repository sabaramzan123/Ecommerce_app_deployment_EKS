name: Destroy AWS Demo Stack

on:
  workflow_dispatch:
    inputs:
      confirm_project_name:
        description: Type the exact project name to confirm destroy.
        required: true
        type: string
      destroy_backend_bucket:
        description: Also delete the Terraform state bucket after destroy.
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'eks-commerce' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.EKS_TF_STATE_KEY || 'eks/terraform.tfstate' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME || 'ecommerce-cluster' }}
  TF_IN_AUTOMATION: true

concurrency:
  group: eks-commerce-destroy
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy EKS and AWS resources
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET is required."
            exit 1
          fi
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "AWS_ROLE_TO_ASSUME is required."
            exit 1
          fi

      - name: Confirm manual destroy request
        shell: bash
        run: |
          set -euo pipefail
          INPUT="${{ github.event.inputs.confirm_project_name }}"
          if [[ "${INPUT}" != "${PROJECT_NAME}" ]]; then
            echo "Confirmation failed. Expected: ${PROJECT_NAME}, Received: ${INPUT}"
            exit 1
          fi
          echo "Confirmation successful. Proceeding with destroy."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Delete K8s resources
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${CLUSTER_NAME}" || true
          kubectl delete namespace ecommerce --ignore-not-found=true || true

      - name: Render backend config for Terraform
        shell: bash
        run: |
          cat > infra/eks/backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "${TF_STATE_KEY}"
          region       = "${AWS_REGION}"
          use_lockfile = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infra/eks

      - name: Terraform destroy EKS
        run: |
          terraform destroy -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "cluster_name=${CLUSTER_NAME}"
        working-directory: infra/eks

      - name: Delete ECR repositories
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for service in "${services[@]}"; do
            repository_name="${PROJECT_NAME}-${service}"
            if aws ecr describe-repositories \
              --region "${AWS_REGION}" \
              --repository-names "${repository_name}" >/dev/null 2>&1; then
              aws ecr delete-repository \
                --region "${AWS_REGION}" \
                --repository-name "${repository_name}" \
                --force
              echo "Deleted ECR repo: ${repository_name}"
            fi
          done

      - name: Remove Terraform state from S3
        shell: bash
        run: |
          aws s3 rm "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}" || true
          aws s3 rm "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}.tflock" || true

      - name: Optionally delete backend bucket
        if: github.event.inputs.destroy_backend_bucket == 'true'
        shell: bash
        run: |
          set -euo pipefail
          aws s3api list-object-versions \
            --bucket "${TF_STATE_BUCKET}" \
            --query 'Versions[].{Key:Key,VersionId:VersionId}' \
            --output json | jq -r '.[] | "\(.Key) \(.VersionId)"' | \
          while read -r key version; do
            aws s3api delete-object \
              --bucket "${TF_STATE_BUCKET}" \
              --key "$key" \
              --version-id "$version"
          done

          aws s3api list-object-versions \
            --bucket "${TF_STATE_BUCKET}" \
            --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
            --output json | jq -r '.[] | "\(.Key) \(.VersionId)"' | \
          while read -r key version; do
            aws s3api delete-object \
              --bucket "${TF_STATE_BUCKET}" \
              --key "$key" \
              --version-id "$version"
          done

          aws s3api delete-bucket --bucket "${TF_STATE_BUCKET}"
          echo "Bucket deleted."

      - name: Summarize destroy result
        shell: bash
        run: |
          {
            echo "## Destroy Complete"
            echo "- Project: ${PROJECT_NAME}"
            echo "- Cluster: ${CLUSTER_NAME}"
            echo "- Region: ${AWS_REGION}"
            echo "- Backend Bucket Removed: ${{ github.event.inputs.destroy_backend_bucket }}"
          } >> "$GITHUB_STEP_SUMMARY"