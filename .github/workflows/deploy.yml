name: Deploy To EKS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/**'
      - 'services/**'
      - 'infra/eks/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use the commit SHA.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'eks-commerce' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.EKS_TF_STATE_KEY || 'eks/terraform.tfstate' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME || 'ecommerce-cluster' }}
  TF_IN_AUTOMATION: true

concurrency:
  group: eks-commerce-production
  cancel-in-progress: false

jobs:

  # ─── JOB 1: EKS cluster provision via Terraform ──────────────────────────────
  provision:
    name: Provision EKS via Terraform
    runs-on: ubuntu-latest
    environment: production
    outputs:
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail
          [[ -z "${TF_STATE_BUCKET}" ]] && echo "TF_STATE_BUCKET is required." && exit 1
          [[ -z "${AWS_ROLE_TO_ASSUME}" ]] && echo "AWS_ROLE_TO_ASSUME is required." && exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Render backend config
        shell: bash
        run: |
          cat > infra/eks/backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "${TF_STATE_KEY}"
          region       = "${AWS_REGION}"
          use_lockfile = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infra/eks

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "cluster_name=${CLUSTER_NAME}"
        working-directory: infra/eks

      - name: Get Terraform outputs
        id: tf_outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
        working-directory: infra/eks

  # ─── JOB 2: Build and push Docker images to ECR ──────────────────────────────
  build-push:
    name: Build and Push Images to ECR
    runs-on: ubuntu-latest
    environment: production
    needs: provision
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Decide image tag
        id: meta
        shell: bash
        run: |
          image_tag="${{ github.event.inputs.image_tag }}"
          [[ -z "${image_tag}" ]] && image_tag="${GITHUB_SHA::12}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Get AWS account ID
        id: aws
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repos if missing
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
        run: |
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            aws ecr describe-repositories \
              --repository-names "${PROJECT_NAME}-${svc}" \
              --region "${AWS_REGION}" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "${PROJECT_NAME}-${svc}" \
              --region "${AWS_REGION}"
          done

      - name: Build and push all images
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(
            "frontend:apps/frontend"
            "gateway:services/gateway"
            "catalog:services/catalog"
            "cart:services/cart"
            "order:services/order"
            "payment:services/payment"
            "notification:services/notification"
          )
          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            image_uri="${registry}/${PROJECT_NAME}-${name}:${IMAGE_TAG}"
            echo "Building ${image_uri}"
            docker build --tag "${image_uri}" "${path}"
            docker push "${image_uri}"
          done

  # ─── JOB 3: Update k8s manifests with new image tag ──────────────────────────
  update-manifests:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: [provision, build-push]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Get AWS account ID
        id: aws
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Update image tags in k8s manifests
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
        run: |
          set -euo pipefail
          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(frontend gateway catalog cart order payment notification)

          for svc in "${services[@]}"; do
            manifest="k8s/${svc}/deployment.yaml"
            new_image="${registry}/${PROJECT_NAME}-${svc}:${IMAGE_TAG}"
            # image: line ko update karo
            sed -i "s|image:.*${svc}.*|image: ${new_image}|" "${manifest}"
            echo "Updated ${manifest} → ${new_image}"
          done

      - name: Commit and push updated manifests
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${IMAGE_TAG}"
          git push

  # ─── JOB 4: Apply k8s manifests to EKS ──────────────────────────────────────
  deploy-k8s:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [provision, build-push, update-manifests]
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${CLUSTER_NAME}"

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply all service manifests
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            echo "Deploying ${svc}..."
            kubectl apply -f "k8s/${svc}/deployment.yaml"
            kubectl apply -f "k8s/${svc}/service.yaml"
          done

      - name: Wait for rollouts
        shell: bash
        run: |
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            echo "Waiting for ${svc}..."
            kubectl rollout status deployment/${svc} -n ecommerce --timeout=120s
          done

      - name: Get frontend URL
        run: |
          echo "Waiting for LoadBalancer IP..."
          sleep 30
          kubectl get svc frontend -n ecommerce

      - name: Summarize deployment
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          {
            echo "## EKS Deployment Complete"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Cluster: ${CLUSTER_NAME}"
            echo "- Region: ${AWS_REGION}"
          } >> "$GITHUB_STEP_SUMMARY"