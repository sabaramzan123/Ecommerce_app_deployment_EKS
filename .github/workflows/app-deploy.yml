name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'services/**'
      - 'k8s/**'
      - '.github/workflows/app-deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use commit SHA.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'eks-commerce' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME || 'ecommerce-cluster' }}

concurrency:
  group: eks-app-production
  cancel-in-progress: false

jobs:

  # ─── JOB 1: Build and push images to ECR ─────────────────────────────────────
  build-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      account_id: ${{ steps.aws.outputs.account_id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decide image tag
        id: meta
        shell: bash
        run: |
          image_tag="${{ github.event.inputs.image_tag }}"
          [[ -z "${image_tag}" ]] && image_tag="${GITHUB_SHA::12}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Get AWS account ID
        id: aws
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repos if missing
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            aws ecr describe-repositories \
              --repository-names "${PROJECT_NAME}-${svc}" \
              --region "${AWS_REGION}" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "${PROJECT_NAME}-${svc}" \
              --region "${AWS_REGION}"
          done

      - name: Build and push all images
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(
            "frontend:apps/frontend"
            "gateway:services/gateway"
            "catalog:services/catalog"
            "cart:services/cart"
            "order:services/order"
            "payment:services/payment"
            "notification:services/notification"
          )
          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            image_uri="${registry}/${PROJECT_NAME}-${name}:${IMAGE_TAG}"
            echo "Building ${image_uri}"
            docker build --tag "${image_uri}" "${path}"
            docker push "${image_uri}"
          done

  # ─── JOB 2: Update k8s manifests with new image tag ──────────────────────────
  update-manifests:
    name: Update Image Tags in Manifests
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Get AWS account ID
        id: aws
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Update image tags in deployment yamls
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
        run: |
          set -euo pipefail
          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            manifest="k8s/${svc}/deployment.yaml"
            new_image="${registry}/${PROJECT_NAME}-${svc}:${IMAGE_TAG}"
            sed -i "s|image:.*|image: ${new_image}|" "${manifest}"
            echo "Updated ${manifest} → ${new_image}"
          done

      - name: Commit updated manifests
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git stash
          git pull origin main --rebase
          git stash pop
          git add k8s/
          git diff --staged --quiet && echo "No manifest changes." && exit 0
          git commit -m "ci: update image tags to ${IMAGE_TAG} [skip ci]"
          git push

  # ─── JOB 3: Deploy updated manifests to EKS ──────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-push, update-manifests]
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${CLUSTER_NAME}"

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply all manifests
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            echo "Deploying ${svc}..."
            kubectl apply -f "k8s/${svc}/deployment.yaml"
            kubectl apply -f "k8s/${svc}/service.yaml"
          done

      - name: Wait for all rollouts
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for svc in "${services[@]}"; do
            echo "Waiting for ${svc} rollout..."
            kubectl rollout status deployment/${svc} \
              -n ecommerce --timeout=180s
          done

      - name: Print frontend URL
        run: |
          echo "Fetching LoadBalancer URL..."
          sleep 20
          kubectl get svc frontend -n ecommerce

      - name: Summarize deployment
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          {
            echo "## App Deployment Complete"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Cluster: ${CLUSTER_NAME}"
            echo "- Namespace: ecommerce"
            echo "- Services: frontend, gateway, catalog, cart, order, payment, notification"
          } >> "$GITHUB_STEP_SUMMARY"